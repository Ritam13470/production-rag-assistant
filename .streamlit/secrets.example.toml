# Streamlit secrets template
# Copy this file to .streamlit/secrets.toml for local Streamlit secrets if needed.
# Never commit the real secrets.toml file.

GOOGLE_API_KEY = "your_api_key_here"

# Provider configuration.
# Only gemini is supported right now. Groq will be added in a later milestone.
CHAT_PROVIDER = "gemini"
EMBEDDING_PROVIDER = "gemini"
GEMINI_CHAT_MODEL = "gemini-2.5-flash"
GEMINI_EMBEDDING_MODEL = "gemini-embedding-2-preview"

# Optional LangSmith tracing for local development with safe/sample documents.
# Keep this disabled for public demos unless trace privacy is handled.
LANGSMITH_TRACING = "false"
LANGSMITH_API_KEY = ""
LANGSMITH_PROJECT = "production-rag-assistant"
